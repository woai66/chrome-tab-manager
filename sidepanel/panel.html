<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tab Manager</title>
  <link rel="stylesheet" href="panel.css">
</head>
<body>
  <div id="app">
    <header id="toolbar">
      <span class="title">Tab Manager</span>
      <div class="toolbar-actions">
        <button id="btn-search-toggle" title="搜索标签">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
            <circle cx="6.5" cy="6.5" r="4.5" stroke="currentColor" stroke-width="1.5"/>
            <line x1="10" y1="10" x2="14" y2="14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </button>
        <button id="btn-new-group" title="新建分组">+</button>
        <button id="btn-settings" title="设置">⚙</button>
      </div>
    </header>

    <div id="settings-panel" class="hidden">
      <label class="settings-row">
        <input type="checkbox" id="toggle-sync">
        <span>跨设备同步</span>
      </label>
      <div id="sync-quota" class="settings-hint">已用 -- / 100 KB</div>
      <div id="sync-status" class="settings-hint">开启后会优先从云端拉取，不会立即上传本机数据</div>
      <div class="settings-hint">仅同步分组和标签 URL，不同步图标</div>
      <div class="settings-actions settings-actions-sync">
        <button id="btn-sync-pull">从云端拉取</button>
        <button id="btn-sync-push">上传到云端</button>
      </div>
      <div class="settings-actions">
        <button id="btn-export-data">导出数据</button>
        <button id="btn-import-data">导入数据</button>
      </div>
      <input id="import-data-input" type="file" accept="application/json" class="hidden">
    </div>

    <div id="search-bar" class="hidden">
      <input id="search-input" type="text" placeholder="搜索标签标题或网址…" autocomplete="off">
    </div>

    <div id="new-group-form" class="hidden">
      <input id="new-group-input" type="text" placeholder="分组名称" maxlength="20" autocomplete="off">
      <button id="btn-group-confirm" title="确认">✓</button>
      <button id="btn-group-cancel" title="取消">✕</button>
    </div>

    <section id="active-section">
      <div class="section-header">
        <span>当前标签页</span>
        <button id="btn-hibernate-all" title="保存所有标签到分组（Shift+点击=关闭标签）">全部保存</button>
      </div>
      <ul id="active-list"></ul>
    </section>

    <section id="groups-section">
      <div class="section-header">
        <span>标签组</span>
      </div>
      <div id="groups-list"></div>
    </section>
  </div>

  <div id="group-picker" class="hidden">
    <div id="group-picker-list"></div>
    <button id="btn-picker-new">+ 新建分组</button>
  </div>

  <script src="panel.js"></script>
</body>
</html>
